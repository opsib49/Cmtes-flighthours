<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <title>VOARE FlightHours</title>

  <link rel="stylesheet" href="/css/styles.css"/>
</head>

<body>
  <main id="app">
    <div class="container">
      <div class="card" style="text-align:center;margin-top:40px;">
        <h1>✈️ VOARE</h1>
        <p style="color:#94a3b8;margin-bottom:20px;">
          Sistema de horas de voo, perfil dos comandantes e módulo gamificado.
        </p>

        <div id="statusBox" class="msg warning">
          Verificando sessão...
        </div>

        <button id="btnEntrar">Entrar</button>
        <button id="btnCadastro" class="secondary">Cadastrar</button>
      </div>

      <div class="card" style="margin-top:15px;">
        <h3>Operação</h3>
        <button id="btnDashboard">Painel do Comandante</button>
        <button id="btnGame" class="secondary">🎲 Corrida Maluca</button>
        <button id="btnAdmin" class="secondary" style="display:none;">⚙️ Administração</button>
        <button id="btnLogout" class="secondary" style="display:none;">Sair</button>
      </div>

      <div class="card" style="margin-top:15px;">
        <h3>Radar VOARE</h3>
        <div id="radar" class="radar"></div>
      </div>
    </div>
  </main>

<script type="module">
import { getSupabase, apiFetch } from '/js/supabase-config.js';
import { RadarEngine } from '/js/RadarEngine.js';

const $ = id => document.getElementById(id);

let supabase = null;
let usuario = null;

async function iniciar() {
  supabase = await getSupabase();

  const radar = new RadarEngine('radar');
  radar.init();

  $('btnEntrar').addEventListener('click', () => window.location.href = '/login.html');
  $('btnCadastro').addEventListener('click', () => window.location.href = '/cadastro.html');
  $('btnGame').addEventListener('click', () => window.location.href = '/game.html');
  $('btnDashboard').addEventListener('click', () => window.location.href = '/dashboard.html');
  $('btnAdmin').addEventListener('click', () => window.location.href = '/admin.html');

  $('btnLogout').addEventListener('click', async () => {
    await supabase.auth.signOut();
    window.location.href = '/login.html';
  });

  await verificarSessao();
}

async function verificarSessao() {
  try {
    const { data } = await supabase.auth.getSession();

    if (!data?.session) {
      $('statusBox').textContent = 'Acesse sua conta para continuar.';
      $('btnLogout').style.display = 'none';
      return;
    }

    const me = await apiFetch('/api/me');
    usuario = me.user;

    $('statusBox').textContent = `Logado como ${usuario.nome || usuario.email}`;
    $('btnLogout').style.display = 'block';

    if (usuario.perfil === 'admin') {
      $('btnAdmin').style.display = 'block';
    }

  } catch (e) {
    $('statusBox').textContent = 'Erro ao verificar sessão: ' + e.message;
  }
}

iniciar();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <title>Corrida Maluca - VOARE</title>

  <link rel="stylesheet" href="/css/styles.css"/>
  <link rel="stylesheet" href="/css/game.css"/>
</head>

<body>
  <main class="container">

    <section class="card" style="text-align:center;margin-top:18px;">
      <h1>🎲 Corrida Maluca</h1>
      <p class="alert">
        Horas fictícias do jogo. Não alteram as horas reais de voo.
      </p>

      <div id="userBox" style="margin-top:15px;color:#94a3b8;">
        Carregando comandante...
      </div>

      <div id="statusBox" class="msg warning">
        Verificando status do dia...
      </div>
    </section>

    <section class="card" style="margin-top:15px;text-align:center;">
      <h3>Corrida diária</h3>

      <div id="diceBox" style="
        width:130px;
        height:130px;
        margin:20px auto;
        border-radius:28px;
        background:#020503;
        border:1px solid rgba(16,185,129,.35);
        display:flex;
        align-items:center;
        justify-content:center;
        font-size:70px;
        box-shadow:0 0 35px rgba(16,185,129,.12);
      ">
        🎲
      </div>

      <button id="btnJogar">🏁 CORRER</button>

      <div id="resultado" class="msg" style="min-height:40px;"></div>
    </section>

    <section class="card" style="margin-top:15px;">
      <h3>🏆 Ranking</h3>
      <div id="ranking">Carregando...</div>
    </section>

    <section class="card" style="margin-top:15px;">
      <h3>📢 Feed</h3>
      <div id="feed">Carregando...</div>
    </section>

    <section class="card" style="margin-top:15px;">
      <button id="btnVoltar" class="secondary">Voltar ao início</button>
    </section>

  </main>

<script type="module">
import { checkAuthOrRedirect } from '/js/supabase-config.js';
import RaceGame from '/js/game/RaceGame.js';

await checkAuthOrRedirect();

const $ = id => document.getElementById(id);

const game = new RaceGame();

async function iniciar() {
  try {
    await game.init();

    renderUser();
    await renderStatus();
    game.renderRanking('ranking');
    game.renderFeed('feed');

    $('btnJogar').addEventListener('click', jogar);
    $('btnVoltar').addEventListener('click', () => window.location.href = '/index.html');

  } catch (e) {
    alert(e.message);
  }
}

function renderUser() {
  if (!game.user) return;

  const posicao = game.getMyRankingPosition();

  $('userBox').innerHTML = `
    <strong style="color:#10b981;">${game.user.nome || game.user.email}</strong><br>
    ${Number(game.user.horas_gamificadas || 0)}h fictícias
    ${posicao ? `<br><span style="color:#facc15;">${posicao}º no ranking</span>` : ''}
  `;
}

async function renderStatus() {
  const status = await game.loadStatus();

  if (status.hasPlayedToday) {
    $('statusBox').textContent = '✅ Você já correu hoje. Volte amanhã.';
    $('btnJogar').disabled = true;
    $('btnJogar').style.opacity = '.55';
  } else {
    $('statusBox').textContent = '🟢 Pronto para correr hoje.';
    $('btnJogar').disabled = false;
    $('btnJogar').style.opacity = '1';
  }
}

async function animarDado(valorFinal) {
  const dice = $('diceBox');
  const faces = ['⚀','⚁','⚂','⚃','⚄','⚅'];

  let count = 0;

  return new Promise(resolve => {
    const interval = setInterval(() => {
      const v = Math.floor(Math.random() * 6);
      dice.textContent = faces[v];
      dice.style.transform = `rotate(${Math.random() * 30 - 15}deg) scale(1.05)`;

      count++;

      if (count > 18) {
        clearInterval(interval);
        dice.textContent = faces[valorFinal - 1];
        dice.style.transform = 'rotate(0deg) scale(1)';
        resolve();
      }
    }, 55);
  });
}

async function jogar() {
  try {
    $('resultado').textContent = 'Girando dado...';
    $('btnJogar').disabled = true;

    const result = await game.roll();

    await animarDado(result.valorDado);

    $('resultado').textContent = result.mensagem;

    if (result.precisaEscolherAlvo) {
      await game.abrirModalSabotagem(async () => {
        await game.init();
        renderUser();
        game.renderRanking('ranking');
        game.renderFeed('feed');
        await renderStatus();
      });
    }

    await game.init();
    renderUser();
    game.renderRanking('ranking');
    game.renderFeed('feed');
    await renderStatus();

  } catch (e) {
    $('resultado').textContent = '❌ ' + e.message;
    $('btnJogar').disabled = false;
  }
}

iniciar();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <title>Painel do Comandante - VOARE</title>
  <link rel="stylesheet" href="/css/styles.css"/>
</head>

<body>
  <main class="container">
    <section class="card" style="margin-top:18px;text-align:center;">
      <h1>✈️ Painel do Comandante</h1>
      <p id="userBox" style="color:#94a3b8;">Carregando...</p>
      <button id="btnVoltar" class="secondary">Voltar</button>
    </section>

    <section class="card" style="margin-top:15px;">
      <h3>📊 Resumo</h3>
      <p>Total no mês: <strong id="totalMes">0h</strong></p>
      <p>Dias voados: <strong id="diasVoados">0</strong></p>
    </section>

    <section class="card" style="margin-top:15px;">
      <h3>📅 Calendário</h3>
      <div id="calendar" class="calendar"></div>
    </section>
  </main>

<script type="module">
import { checkAuthOrRedirect, apiFetch } from '/js/supabase-config.js';
import RadarEngine from '/js/RadarEngine.js';
import FlightHours from '/js/FlightHours.js';

await checkAuthOrRedirect();

const $ = id => document.getElementById(id);

async function iniciar() {
  try {
    const me = await apiFetch('/api/me');
    $('userBox').textContent = me.user?.nome || me.user?.email || 'Comandante';

    await RadarEngine.init();

    const hoje = new Date();
    const total = await FlightHours.getTotalMes(
      hoje.getFullYear(),
      hoje.getMonth() + 1
    );

    $('totalMes').textContent = `${Number(total || 0).toFixed(1)}h`;

    const eventos = await FlightHours.getEventosCalendario();
    const diasVoados = eventos.filter(e => e.tipo === 'voo').length;
    $('diasVoados').textContent = diasVoados;

  } catch (e) {
    alert(e.message);
  }
}

$('btnVoltar').addEventListener('click', () => {
  window.location.href = '/index.html';
});

iniciar();
</script>
</body>
</html>

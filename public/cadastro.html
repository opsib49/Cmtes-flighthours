<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro - FlightHours</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f172a, #020503);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      background: #111827;
      padding: 30px;
      border-radius: 15px;
      width: 350px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
      color: #10b981;
    }

    input, select {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border-radius: 8px;
      border: none;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 15px;
      background: #10b981;
      color: black;
      font-weight: bold;
      border: none;
      border-radius: 10px;
      cursor: pointer;
    }

    button:hover {
      background: #059669;
    }

    .msg {
      margin-top: 15px;
      text-align: center;
      font-size: 14px;
    }

    .link {
      text-align: center;
      margin-top: 15px;
    }

    a {
      color: #10b981;
      text-decoration: none;
    }
  </style>
</head>
<body>

<div class="container">
  <h2>✈️ Cadastro de Comandante</h2>

  <form id="formCadastro">
    <input type="text" id="nome" placeholder="Nome completo" required>

    <select id="patente" required>
      <option value="">Patente</option>
      <option>Copiloto</option>
      <option>Comandante</option>
      <option>Instrutor</option>
    </select>

    <input type="email" id="email" placeholder="Email" required>
    <input type="password" id="senha" placeholder="Senha (mín. 6)" required>
    <input type="password" id="confirmar" placeholder="Confirmar senha" required>

    <button type="submit">Cadastrar</button>
  </form>

  <div class="msg" id="msg"></div>

  <div class="link">
    <a href="/login.html">Já tem conta? Entrar</a>
  </div>
</div>

<script type="module">
import { supabase } from '/js/supabase-config.js'

const form = document.getElementById('formCadastro')
const msg = document.getElementById('msg')

form.addEventListener('submit', async (e) => {
  e.preventDefault()

  const nome = document.getElementById('nome').value
  const patente = document.getElementById('patente').value
  const email = document.getElementById('email').value
  const senha = document.getElementById('senha').value
  const confirmar = document.getElementById('confirmar').value

  if (senha !== confirmar) {
    msg.innerHTML = '❌ Senhas não conferem'
    return
  }

  if (senha.length < 6) {
    msg.innerHTML = '❌ Senha muito curta'
    return
  }

  msg.innerHTML = '⏳ Criando conta...'

  const { data, error } = await supabase.auth.signUp({
    email: email,
    password: senha,
    options: {
      data: {
        nome: nome,
        patente: patente
      }
    }
  })

  if (error) {
    msg.innerHTML = '❌ ' + error.message
    return
  }

  msg.innerHTML = '✅ Cadastro realizado! Redirecionando...'

  setTimeout(() => {
    window.location.href = '/game.html'
  }, 1500)
})
</script>

</body>
</html>
